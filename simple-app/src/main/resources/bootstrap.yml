spring:
  cloud:
    config:
      server:
        awsparamstore:
          region: eu-central-1
          endpoint: https://ssm.eu-central-1.amazonaws.com
          name: simple-app
          prefix: /config
          profile-separator: /
          recursive: true
          decrypt-values: true
          max-results: 5